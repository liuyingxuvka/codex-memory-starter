name: tests

on:
  push:
  pull_request:

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Install Codex KB integration
        run: python scripts/install_codex_kb.py --json

      - name: Run installer health check
        run: python scripts/install_codex_kb.py --check --json

      - name: Run desktop viewer smoke check
        run: python scripts/kb_desktop.py --repo-root . --check
